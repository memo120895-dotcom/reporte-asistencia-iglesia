name: Exportar Asistencia a Google Sheets

on:
  schedule:
    - cron: '0 2 * * 4'   # Miércoles 9pm hora México (CDT, UTC-5)
    - cron: '0 19 * * 0'  # Domingo 2pm hora México (CDT, UTC-5)
  workflow_dispatch:
    # También se puede correr manualmente desde GitHub haciendo clic en "Run workflow"

jobs:
  exportar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v5

      - name: Configurar Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Exportar todas las temporadas activas
        run: node exportar-activos.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SHARE_EMAIL: ${{ secrets.SHARE_EMAIL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          GOOGLE_TOKEN_JSON2: ${{ secrets.GOOGLE_TOKEN_JSON2 }}
