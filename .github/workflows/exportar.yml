name: Exportar Asistencia a Google Sheets

on:
  schedule:
    # Corre todos los días a las 6am UTC = 12am hora México (medianoche)
    # Así el sheet siempre está actualizado al inicio del día siguiente
    - cron: '0 6 * * *'
  workflow_dispatch:
    # También se puede correr manualmente desde GitHub haciendo clic en "Run workflow"

jobs:
  exportar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Exportar todas las temporadas activas
        run: node exportar-activos.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SHARE_EMAIL: ${{ secrets.SHARE_EMAIL }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
